<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>{{CASE_NAME}} – Call Viewer</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --sidebar-calls-width: 260px;
      --sidebar-trans-width: 360px;
      --accent: #1B2D4A;
      --accent-hover: #253D5E;
      --bg: #FCFAF5;
      --bg-card: #ffffff;
      --border: #E0DACE;
      --text: #1A211A;
      --text-muted: #6B736B;
      --text-faint: #9BA09B;
      --highlight: #E8DFB8;
      --active-line: rgba(184, 160, 106, 0.15);
      --gold: #B8A06A;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Call list sidebar ── */
    .calls-sidebar {
      width: var(--sidebar-calls-width);
      background: linear-gradient(180deg, #1B2D4A 0%, #253D5E 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .calls-header {
      padding: 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .calls-header span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    .calls-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .calls-list::-webkit-scrollbar {
      width: 4px;
    }

    .calls-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .call-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      transition: all 0.12s;
    }

    .call-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .call-item.active {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 500;
      border-left: 2px solid var(--gold);
    }

    .call-item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .call-item-dur {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .main-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .main-title {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
    }

    .main-title-filename {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-dur {
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Player ── */
    .player-area {
      background: linear-gradient(135deg, #1B2D4A, #253D5E);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .play-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .play-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .time-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-variant-numeric: tabular-nums;
      min-width: 42px;
    }

    .progress-wrap {
      flex: 1;
      position: relative;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 3px;
      width: 0;
      pointer-events: none;
    }

    .progress-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vol-icon {
      color: rgba(255, 255, 255, 0.7);
    }

    .vol-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .vol-slider {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
    }

    .speed-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.8);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .speed-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .speed-btn.modified {
      background: rgba(184, 160, 106, 0.3);
      color: #E8DFB8;
    }

    .kb-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      white-space: nowrap;
      user-select: none;
    }

    /* ── Content split ── */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Transcript pane ── */
    .transcript-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-left: 1px solid var(--border);
      min-width: 0;
    }

    .trans-header {
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      padding: 7px 12px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }

    .search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(184, 160, 106, 0.15);
    }

    .search-clear {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      padding: 4px;
      border-radius: 4px;
      display: none;
    }

    .search-clear:hover {
      color: var(--text);
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-info {
      font-size: 12px;
      color: var(--text-muted);
    }

    .page-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--text);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .trans-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .trans-page {
      width: min(8.5in, 100%);
      background: var(--bg-card);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 0.33in;
      position: relative;
      display: none;
      margin-bottom: 16px;
    }

    .trans-page::before,
    .trans-page::after {
      content: '';
      position: absolute;
      inset: 0.33in;
      border: 1px solid #e2e8f0;
      pointer-events: none;
    }

    .trans-page::after {
      inset: calc(0.33in + 4px);
    }

    .trans-page.active {
      display: block;
    }

    /* When search is active, show all pages so matches on any page are visible. */
    .trans-scroll.searching .trans-page {
      display: block;
    }
    .trans-scroll.searching .trans-page.no-match {
      display: none;
    }

    .trans-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      line-height: 2.0;
      white-space: pre-wrap;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      gap: 8px;
      padding: 0 2px;
      transition: background 0.1s;
    }

    .trans-line:hover {
      background: rgba(0, 0, 0, 0.03);
    }

    .trans-line.active {
      background: var(--active-line);
    }

    .trans-line mark {
      background: var(--highlight);
      border-radius: 2px;
      padding: 0 1px;
    }

    .line-num {
      color: var(--text-faint);
      font-size: 10pt;
      min-width: 24px;
      text-align: right;
      user-select: none;
    }

    .line-text {
      flex: 1;
    }

    .word-ts {
      cursor: pointer;
      border-radius: 2px;
      padding: 0 0.5px;
      transition: background 0.1s, color 0.1s;
    }

    .word-ts:hover {
      background: var(--highlight);
    }

    .word-ts.active-word {
      background: rgba(184, 160, 106, 0.35);
      color: var(--accent);
    }

    /* ── Summary pane ── */
    .summary-pane {
      width: 320px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.2s ease;
    }

    .summary-pane.collapsed {
      width: 36px;
    }

    .summary-pane.collapsed .summary-header-title,
    .summary-pane.collapsed .summary-body {
      display: none;
    }

    .summary-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .summary-pane.collapsed .summary-header {
      padding: 10px 6px;
      justify-content: center;
      border-bottom: none;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 100%;
      cursor: pointer;
    }

    .summary-header-title {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }

    .summary-collapse-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      font-family: inherit;
      flex-shrink: 0;
    }
    .summary-collapse-btn:hover {
      background: var(--bg-alt);
      color: var(--text);
      border-color: var(--text-muted);
    }
    .summary-pane.collapsed .summary-collapse-btn {
      display: none;
    }

    .summary-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
    }

    .summary-empty {
      color: var(--text-faint);
      font-style: italic;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1B2D4A;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: #991b1b;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(241, 245, 249, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-size: 13px;
      color: var(--text-muted);
    }

    .loading-overlay.hidden { display: none; }
  </style>
</head>

<body>
  <div class="app">

    <!-- Call list -->
    <div class="calls-sidebar">
      <div class="calls-header">
        {{CASE_NAME}}
        <span id="callCount">Loading…</span>
      </div>
      <div class="calls-list" id="callsList"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="main-header">
        <div class="main-title" id="mainTitle">
          <div class="main-title-filename" id="mainTitleFilename">Select a call</div>
          <div class="main-meta" id="mainMeta"></div>
        </div>
        <div class="main-dur" id="mainDur"></div>
      </div>

      <!-- Audio player -->
      <div class="player-area">
        <!-- Play/Pause -->
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>
        <!-- Skip back -->
        <button class="play-btn" onclick="skipBy(-5)" title="Back 5s">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path
              d="M12.5 3C8.4 3 4.9 5.1 3 8.3V5H1v7h7v-2H4.5C5.9 7.3 8.9 5 12.5 5c3.9 0 7 3.1 7 7s-3.1 7-7 7c-2.6 0-4.8-1.4-6.1-3.5L4.7 16.7C6.4 19.3 9.2 21 12.5 21c5 0 9-4 9-9s-4-9-9-9zm-.5 5v5l4 2.5.75-1.23-3.25-2.02V8H12z" />
          </svg>
        </button>
        <div class="time-label" id="timeCurrent">0:00</div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-fill" id="progressFill"></div>
          <input type="range" class="progress-input" id="progressInput" min="0" max="1000" value="0">
        </div>
        <div class="time-label" id="timeDuration" style="text-align:right">0:00</div>
        <!-- Volume -->
        <div class="vol-wrap">
          <span class="vol-icon"><svg viewBox="0 0 24 24">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
            </svg></span>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80">
        </div>
        <button class="speed-btn" id="speedBtn" onclick="cycleSpeed()" title="Playback speed (click to cycle)">1×</button>
        <span class="kb-hint">Space: play · ←→: skip · ↑↓: page</span>
      </div>

      <audio id="audio" style="display:none"></audio>

      <!-- Content split -->
      <div class="content-area" style="position:relative">
        <div class="loading-overlay hidden" id="loadingOverlay">Loading audio…</div>
        <!-- Transcript -->
        <div class="transcript-pane">
          <div class="trans-header">
            <input type="text" class="search-input" id="searchInput" placeholder="Search transcript…">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
            <div class="page-nav">
              <button class="page-btn" id="prevBtn" onclick="goPage(-1)" disabled>
                <svg viewBox="0 0 24 24">
                  <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                </svg>
              </button>
              <span class="page-info" id="pageInfo">–</span>
              <button class="page-btn" id="nextBtn" onclick="goPage(1)" disabled>
                <svg viewBox="0 0 24 24">
                  <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                </svg>
              </button>
            </div>
          </div>
          <div class="trans-scroll" id="transScroll"></div>
        </div>

        <!-- Summary -->
        <div class="summary-pane" id="summaryPane">
          <div class="summary-header" id="summaryHeader">
            <span class="summary-header-title">AI Summary</span>
            <button class="summary-collapse-btn" id="summaryCollapseBtn" title="Collapse summary">&#8250;</button>
          </div>
          <div class="summary-body" id="summaryBody"><span class="summary-empty">No call selected.</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Data injected by Python ──
    const CALLS = {{ CALLS_JSON }};

    // ── State ──
    let currentCallIdx = -1;
    let currentPage = 1;
    let totalPages = 1;
    let lineEntries = [];  // flat array of {page, line, text, start, end}
    const SPEEDS = [0.75, 1, 1.25, 1.5, 2];
    let speedIdx = 1;

    const playIcon = document.getElementById('playIcon');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeDuration = document.getElementById('timeDuration');
    const progressFill = document.getElementById('progressFill');
    const progressInput = document.getElementById('progressInput');
    const volSlider = document.getElementById('volSlider');
    const speedBtn = document.getElementById('speedBtn');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const transScroll = document.getElementById('transScroll');
    const summaryBody = document.getElementById('summaryBody');
    const summaryPane = document.getElementById('summaryPane');
    const summaryHeader = document.getElementById('summaryHeader');
    const summaryCollapseBtn = document.getElementById('summaryCollapseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfo = document.getElementById('pageInfo');
    const mainTitleFilename = document.getElementById('mainTitleFilename');
    const mainMeta = document.getElementById('mainMeta');
    const mainDur = document.getElementById('mainDur');
    const callsList = document.getElementById('callsList');
    const callCount = document.getElementById('callCount');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastEl = document.getElementById('toast');
    let isScrubbing = false;

    function showToast(msg, isError) {
      toastEl.textContent = msg;
      toastEl.className = 'toast visible' + (isError ? ' error' : '');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => { toastEl.className = 'toast'; }, 3500);
    }

    // ── Init call list ──
    callCount.textContent = CALLS.length + ' call' + (CALLS.length === 1 ? '' : 's');

    CALLS.forEach((call, i) => {
      const item = document.createElement('div');
      item.className = 'call-item';
      item.dataset.idx = i;
      item.innerHTML = `
    <div class="call-item-name">${esc(call.filename)}</div>
    <div class="call-item-dur">${formatDur(call.duration)}</div>
  `;
      item.addEventListener('click', () => loadCall(i));
      callsList.appendChild(item);
    });

    function loadCall(idx) {
      currentCallIdx = idx;
      const call = CALLS[idx];

      // Update sidebar active state
      document.querySelectorAll('.call-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      // Update header
      mainTitleFilename.textContent = call.filename;
      const metaParts = [call.datetime, call.inmate, call.facility, call.outcome].filter(Boolean);
      mainMeta.textContent = metaParts.join(' · ');
      mainDur.textContent = formatDur(call.duration);

      // Update audio
      loadingOverlay.classList.remove('hidden');
      ws.stop();
      resetProgressUI(call.duration || 0);
      loadAudioForCall(call);

      // Update summary
      if (call.summary) {
        summaryBody.textContent = '';
        call.summary.split('\n').forEach((line, i, arr) => {
          summaryBody.appendChild(document.createTextNode(line));
          if (i < arr.length - 1) summaryBody.appendChild(document.createElement('br'));
        });
      } else {
        summaryBody.innerHTML = '<span class="summary-empty">No summary available.</span>';
      }

      // Build line entries
      lineEntries = call.lines || [];
      totalPages = lineEntries.reduce((m, l) => Math.max(m, l.page || 1), 1);

      searchInput.value = '';
      searchClear.style.display = 'none';
      goToPage(1);
    }

    // ── Transcript rendering ──
    function renderPage(page, query) {
      const q = (query || '').trim().toLowerCase();
      const pages = {};
      lineEntries.forEach(l => {
        const p = l.page || 1;
        if (!pages[p]) pages[p] = [];
        pages[p].push(l);
      });

      transScroll.innerHTML = '';
      transScroll.classList.toggle('searching', !!q);
      const maxPage = Math.max(...Object.keys(pages).map(Number), 1);

      for (let p = 1; p <= maxPage; p++) {
        const pageEl = document.createElement('div');
        pageEl.className = 'trans-page' + (p === page ? ' active' : '');
        pageEl.dataset.page = p;
        let pageHasMatch = false;

        const lines = (pages[p] || []).sort((a, b) => (a.line || 0) - (b.line || 0));
        lines.forEach(entry => {
          const lineText = entry.rendered_text || entry.text || '';
          if (q && lineText.toLowerCase().includes(q)) pageHasMatch = true;
          const div = document.createElement('div');
          div.className = 'trans-line';
          div.dataset.start = entry.start || 0;
          div.dataset.end = entry.end || 0;

          const lineNum = `<span class="line-num">${entry.line || ''}</span>`;

          if (entry.words && entry.words.length > 0 && !q) {
            // Render prefix (speaker label / continuation indent) as plain text
            const rendered = entry.rendered_text || '';
            const plainText = entry.text || '';
            const prefixLen = rendered.length - plainText.length;
            const prefix = prefixLen > 0 ? esc(rendered.substring(0, prefixLen)) : '';

            const wordSpans = entry.words.map(w =>
              `<span class="word-ts" data-ws="${w.s}" data-we="${w.e}">${esc(w.t)}</span>`
            ).join(' ');
            div.innerHTML = `${lineNum}<span class="line-text">${prefix}${wordSpans}</span>`;

            // Click on a word seeks to that word's timestamp
            div.querySelectorAll('.word-ts').forEach(span => {
              span.addEventListener('click', (e) => {
                e.stopPropagation();
                seekTo(parseFloat(span.dataset.ws) || 0);
              });
            });
            // Click on the line (but not a word) seeks to line start
            div.addEventListener('click', () => seekTo(parseFloat(entry.start) || 0));
          } else {
            // Fallback: no word data or search active — render as before
            div.addEventListener('click', () => seekTo(parseFloat(entry.start) || 0));
            const highlighted = q ? highlightText(lineText, q) : esc(lineText);
            div.innerHTML = `${lineNum}<span class="line-text">${highlighted}</span>`;
          }

          pageEl.appendChild(div);
        });

        if (q && !pageHasMatch) pageEl.classList.add('no-match');
        transScroll.appendChild(pageEl);
      }

      updatePageNav(page, maxPage, q);
    }

    function goToPage(page) {
      currentPage = Math.max(1, Math.min(page, totalPages));
      renderPage(currentPage, searchInput.value);
      transScroll.scrollTo({ top: 0 });
    }

    function goPage(delta) {
      goToPage(currentPage + delta);
    }

    function updatePageNav(page, maxPage, query) {
      totalPages = maxPage;
      if (query) {
        const visible = transScroll.querySelectorAll('.trans-page:not(.no-match)').length;
        pageInfo.textContent = visible
          ? `${visible} page${visible === 1 ? '' : 's'} with matches`
          : 'No matches';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
      } else {
        pageInfo.textContent = maxPage > 1 ? `Page ${page} / ${maxPage}` : `Page ${page}`;
        prevBtn.disabled = page <= 1;
        nextBtn.disabled = page >= maxPage;
      }
    }

    // ── Search ──
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      searchClear.style.display = q ? 'block' : 'none';
      renderPage(currentPage, q);
    });

    function clearSearch() {
      searchInput.value = '';
      searchClear.style.display = 'none';
      renderPage(currentPage, '');
    }

    // ── Summary panel collapse ──
    function toggleSummaryPane() {
      const collapsed = summaryPane.classList.toggle('collapsed');
      summaryCollapseBtn.innerHTML = collapsed ? '&#8249;' : '&#8250;';
      try { localStorage.setItem('jcs_summary_collapsed', collapsed ? '1' : '0'); } catch (e) {}
    }
    summaryCollapseBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSummaryPane(); });
    summaryHeader.addEventListener('click', () => {
      if (summaryPane.classList.contains('collapsed')) toggleSummaryPane();
    });
    try {
      if (localStorage.getItem('jcs_summary_collapsed') === '1') {
        summaryPane.classList.add('collapsed');
        summaryCollapseBtn.innerHTML = '&#8249;';
      }
    } catch (e) {}

    // ── Audio Setup ──
    const audioEl = document.getElementById('audio');
    const ws = {
      stop() {
        audioEl.pause();
        try { audioEl.currentTime = 0; } catch {}
      },
      load(url) {
        audioEl.src = url;
        audioEl.load();
      },
      getDuration() {
        return Number.isFinite(audioEl.duration) ? audioEl.duration : 0;
      },
      setTime(seconds) {
        try { audioEl.currentTime = seconds; } catch {}
      },
      playPause() {
        if (audioEl.paused) {
          audioEl.play().catch(() => onPlayerError());
        } else {
          audioEl.pause();
        }
      },
      play() {
        return audioEl.play();
      },
      getCurrentTime() {
        return audioEl.currentTime || 0;
      },
      setPlaybackRate(rate) {
        audioEl.playbackRate = rate;
      },
      setVolume(volume) {
        audioEl.volume = volume;
      },
      isPlaying() {
        return !audioEl.paused;
      }
    };

    function onPlayerTimeUpdate(t) {
      timeCurrent.textContent = formatTime(t);
      if (!isScrubbing) syncProgressUI(t, ws.getDuration());
      syncActiveLines(t);
    }

    function onPlayerReady() {
      loadingOverlay.classList.add('hidden');
      const duration = ws.getDuration();
      timeDuration.textContent = formatTime(duration);
      syncProgressUI(ws.getCurrentTime(), duration);
      if (pendingSeek > 0) {
        ws.setTime(pendingSeek);
        syncProgressUI(pendingSeek, duration);
        pendingSeek = 0;
      }
    }

    function onPlayerError() {
      loadingOverlay.classList.add('hidden');
      showToast('Failed to load audio file', true);
    }

    function onPlayerPlay() {
      playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }

    function onPlayerPause() {
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }

    audioEl.addEventListener('timeupdate', () => onPlayerTimeUpdate(audioEl.currentTime || 0));
    audioEl.addEventListener('loadedmetadata', onPlayerReady);
    audioEl.addEventListener('play', onPlayerPlay);
    audioEl.addEventListener('pause', onPlayerPause);
    audioEl.addEventListener('error', onPlayerError);
    audioEl.addEventListener('ended', () => {
      syncProgressUI(ws.getDuration(), ws.getDuration());
      onPlayerPause();
    });

    let pendingSeek = 0;

    function loadAudioForCall(call) {
      const audioUrl = 'audio/' + encodeURIComponent(call.audio_filename || '');
      ws.load(audioUrl);
    }

    function togglePlay() {
      ws.playPause();
    }

    function seekTo(seconds) {
      if (ws.getDuration() > 0) {
        const clamped = Math.max(0, Math.min(seconds, ws.getDuration()));
        ws.setTime(clamped);
        onPlayerTimeUpdate(clamped);
        if (!ws.isPlaying()) ws.play();
      } else {
        pendingSeek = seconds; // audio not loaded yet
      }
    }

    function skipBy(delta) {
      const t = ws.getCurrentTime() + delta;
      const clamped = Math.max(0, Math.min(t, ws.getDuration()));
      ws.setTime(clamped);
      onPlayerTimeUpdate(clamped);
    }

    function cycleSpeed() {
      speedIdx = (speedIdx + 1) % SPEEDS.length;
      const s = SPEEDS[speedIdx];
      ws.setPlaybackRate(s);
      speedBtn.textContent = s + '×';
      speedBtn.classList.toggle('modified', s !== 1);
      try { localStorage.setItem('jcs_playback_speed', String(s)); } catch (e) {}
    }

    function syncProgressUI(currentTime, duration) {
      const total = duration || 0;
      const safeTime = Math.max(0, currentTime || 0);
      const ratio = total > 0 ? Math.max(0, Math.min(1, safeTime / total)) : 0;
      progressInput.value = String(Math.round(ratio * 1000));
      progressFill.style.width = `${ratio * 100}%`;
    }

    function resetProgressUI(duration) {
      timeCurrent.textContent = '0:00';
      timeDuration.textContent = formatTime(duration || 0);
      syncProgressUI(0, duration || 0);
    }

    function scrubToInputValue() {
      const duration = ws.getDuration();
      if (duration <= 0) return;
      const ratio = Math.max(0, Math.min(1, (parseFloat(progressInput.value) || 0) / 1000));
      const seconds = ratio * duration;
      syncProgressUI(seconds, duration);
      ws.setTime(seconds);
    }

    progressInput.addEventListener('pointerdown', () => {
      isScrubbing = true;
    });
    progressInput.addEventListener('pointerup', () => {
      isScrubbing = false;
      syncProgressUI(ws.getCurrentTime(), ws.getDuration());
    });
    progressInput.addEventListener('input', scrubToInputValue);
    progressInput.addEventListener('change', () => {
      scrubToInputValue();
      isScrubbing = false;
    });

    volSlider.addEventListener('input', () => {
      ws.setVolume(volSlider.value / 100);
    });
    ws.setVolume(0.8);

    try {
      const storedSpeed = parseFloat(localStorage.getItem('jcs_playback_speed') || '');
      const storedIdx = SPEEDS.indexOf(storedSpeed);
      if (storedIdx !== -1) speedIdx = storedIdx;
    } catch (e) {}
    ws.setPlaybackRate(SPEEDS[speedIdx]);
    speedBtn.textContent = SPEEDS[speedIdx] + '×';
    speedBtn.classList.toggle('modified', SPEEDS[speedIdx] !== 1);

    function syncActiveLines(t) {
      let activePage = 0;
      for (const entry of lineEntries) {
        const start = parseFloat(entry.start) || 0;
        const end = parseFloat(entry.end) || 0;
        if (t >= start && t < (end || start + 5)) {
          activePage = entry.page || 1;
          break;
        }
      }

      if (activePage && activePage !== currentPage) {
        goToPage(activePage);
      }

      let didScroll = false;
      document.querySelectorAll('.trans-line').forEach(el => {
        const start = parseFloat(el.dataset.start) || 0;
        const end = parseFloat(el.dataset.end) || 0;
        const isActive = t >= start && t < (end || start + 5);
        el.classList.toggle('active', isActive);
        if (isActive && !didScroll) {
          didScroll = true;
          el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
        // Highlight active word within the line
        el.querySelectorAll('.word-ts').forEach(ws => {
          const ws0 = parseFloat(ws.dataset.ws) || 0;
          const we0 = parseFloat(ws.dataset.we) || 0;
          ws.classList.toggle('active-word', t >= ws0 && t < we0);
        });
      });
    }

    // ── Utilities ──
    function formatTime(s) {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function formatDur(seconds) {
      if (!seconds) return '';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function highlightText(text, query) {
      if (!query) return esc(text);
      const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return esc(text).replace(re, '<mark>$1</mark>');
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', e => {
      if (e.target === searchInput) return;
      if (e.key === ' ') { e.preventDefault(); togglePlay(); }
      if (e.key === 'ArrowLeft') skipBy(-5);
      if (e.key === 'ArrowRight') skipBy(5);
      if (e.key === 'ArrowUp') { e.preventDefault(); goPage(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goPage(1); }
    });

    // Load first call or requested call from URL
    const urlParams = new URLSearchParams(window.location.search);
    const callParam = urlParams.get('call');
    const timeParam = urlParams.get('t');

    let startIdx = 0;
    if (callParam) {
      const foundIdx = CALLS.findIndex(c => c.filename === callParam || c.audio_filename === callParam || c.filename.startsWith(callParam) || (c.audio_filename && c.audio_filename.startsWith(callParam)));
      if (foundIdx !== -1) {
        startIdx = foundIdx;
      } else {
        setTimeout(() => showToast('Requested call not found — showing first call'), 500);
      }
    }

    if (timeParam) {
      let targetSecs = 0;
      const cleanT = timeParam.replace('[', '').replace(']', '');
      const parts = cleanT.split(':');
      if (parts.length === 3) targetSecs = +parts[0] * 3600 + +parts[1] * 60 + +parts[2];
      else if (parts.length === 2) targetSecs = +parts[0] * 60 + +parts[1];
      else targetSecs = parseFloat(cleanT);

      if (!isNaN(targetSecs) && targetSecs >= 0) {
        pendingSeek = targetSecs;
      }
    }

    if (CALLS.length > 0) {
      loadCall(startIdx);
    }
  </script>
</body>

</html>
